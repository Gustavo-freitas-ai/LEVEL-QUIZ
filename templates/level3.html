    <main>

        <h1>LEVEL 3</h1>

        <div class="questions">

            <p>
                A store sells a backpack for $80.
                It is on sale with a 15% discount.

                What is the final price?
            </p>

            <form method="POST">

                <div class="alternatives">
                    <button name="resposta" value="1">A) $68</button>
                    <button name="resposta" value="2">B) $70</button>
                    <button name="resposta" value="3">C) $72</button>
                    <button name="resposta" value="4">D) $75</button>
                </div>

            </form>

            <h2>{{ resultado }}</h2>

        </div>

    </main>
